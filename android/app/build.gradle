plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'  // <--- Ye line lazmi add karein
    id 'com.facebook.react'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.Nutrition' 
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.Nutrition"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    
    // React Native 0.74+ builds ke liye ye zaroori hai
    packagingOptions {
        pickFirst '**/armeabi-v7a/libc++_shared.so'
        pickFirst '**/arm64-v8a/libc++_shared.so'
        pickFirst '**/x86/libc++_shared.so'
        pickFirst '**/x86_64/libc++_shared.so'
    }
}

dependencies {
    implementation("com.facebook.react:react-android") // Standard way

    // Firebase libraries (Autolinking handle kar lega, but manually rakhi hain toh version clash na ho)
    implementation platform('com.google.firebase:firebase-bom:34.10.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-firestore'
}

