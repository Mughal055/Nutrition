apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

android {
    namespace 'com.Nutrition' 
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.Nutrition"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
        
        // Helps avoid "method limit" errors with large libraries like Firebase
        multiDexEnabled true 
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "com.facebook.react:react-native:+"

    // 1. IMPORT THE FIREBASE BoM (Essential to manage versions)
    implementation platform('com.google.firebase:firebase-bom:34.8.0')

    // 2. ADD FIREBASE LIBRARIES (No versions or -ktx needed here now)
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-firestore'
}

// MUST stay at the very bottom
apply plugin: 'com.google.gms.google-services'
