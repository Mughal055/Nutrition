plugins {
    id 'com.android.application' version '8.1.1' apply false
    id 'com.android.library' version '8.1.1' apply false
    id 'org.jetbrains.kotlin.android' version '1.8.10' apply false
    id 'com.facebook.react' apply false
    id 'com.google.gms.google-services' version '4.4.4' apply false
}

// android/build.gradle
ext {
    buildToolsVersion = "34.0.0" // 36 se 34 kar dein
    minSdkVersion = 24
    compileSdkVersion = 34      // 36 se 34 kar dein
    targetSdkVersion = 34       // 36 se 34 kar dein
    kotlinVersion = "2.1.0"    // 2.1.20 boht naya hai, 1.8.10 ya 1.9.0 stable hai
}

allprojects {
    repositories {
        mavenLocal()
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/react-native/android") }
    }
}
