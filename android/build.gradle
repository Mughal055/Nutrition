// android/build.gradle
buildscript {
    ext {
    buildToolsVersion = "34.0.0" // 36 se 34 kar dein
    minSdkVersion = 24
    compileSdkVersion = 34      // 36 se 34 kar dein
    targetSdkVersion = 34       // 36 se 34 kar dein
    kotlinVersion = "1.8.10"    // 2.1.20 boht naya hai, 1.8.10 ya 1.9.0 stable hai
}

    repositories {
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/@react-native/gradle-plugin") }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
         classpath("com.facebook.react:react-native-gradle-plugin")
        //classpath files('../node_modules/@react-native/gradle-plugin/build/libs/gradle-plugin.jar')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.4")
    }
}

allprojects {
    repositories {
        mavenLocal()
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/react-native/android") }
    }
}