pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    // This points to the new React Native Gradle Plugin
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
    // This plugin handles autolinking for you
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
    // This discovers your node_modules automatically
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'Nutrition'
include ':app'

// Note: In modern RN, you do NOT need the 'apply from: ...' 
// or the 'getReactNativePath' function here anymore.
